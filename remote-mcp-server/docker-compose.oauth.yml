version: '3.8'

services:
  # Ory Kratos - Identity Management
  kratos:
    image: oryd/kratos:v1.0.0
    ports:
      - "4433:4433" # public API
      - "4434:4434" # admin API
    environment:
      - DSN=postgresql://dasein@host.docker.internal:5432/dc_app_dev3_tmp?sslmode=disable&search_path=kratos
    restart: unless-stopped
    command: serve -c /etc/config/kratos/kratos.yml --dev --watch-courier
    volumes:
      - ./ory/kratos:/etc/config/kratos
    networks:
      - ory
    depends_on:
      - kratos-migrate

  kratos-migrate:
    image: oryd/kratos:v1.0.0
    environment:
      - DSN=postgresql://dasein@host.docker.internal:5432/dc_app_dev3_tmp?sslmode=disable&search_path=kratos
    command: migrate sql -e --yes
    volumes:
      - ./ory/kratos:/etc/config/kratos
    networks:
      - ory
    restart: on-failure

  # Ory Hydra - OAuth2 Provider  
  hydra:
    image: oryd/hydra:v2.2.0
    ports:
      - "4444:4444" # Public endpoint
      - "4445:4445" # Admin endpoint
    command: serve -c /etc/config/hydra/hydra.yml all --dev
    environment:
      - DSN=postgresql://dasein@host.docker.internal:5432/dc_app_dev3_tmp?sslmode=disable&search_path=hydra
      - SECRETS_SYSTEM=this-is-the-system-secret-change-it
      - URLS_SELF_ISSUER=http://localhost:4444
      - URLS_CONSENT=http://localhost:3003/auth/consent
      - URLS_LOGIN=http://localhost:3003/auth/login-challenge
      - URLS_LOGOUT=http://localhost:3003/auth/logout
    restart: unless-stopped
    volumes:
      - ./ory/hydra:/etc/config/hydra
    networks:
      - ory
    depends_on:
      - hydra-migrate

  hydra-migrate:
    image: oryd/hydra:v2.2.0
    environment:
      - DSN=postgresql://dasein@host.docker.internal:5432/dc_app_dev3_tmp?sslmode=disable&search_path=hydra
    command: migrate -c /etc/config/hydra/hydra.yml sql -e --yes
    volumes:
      - ./ory/hydra:/etc/config/hydra
    networks:
      - ory
    restart: on-failure

  # Ory SelfService UI (for registration/login flows)
  kratos-selfservice-ui:
    image: oryd/kratos-selfservice-ui-node:v1.0.0
    ports:
      - "4455:3000"
    environment:
      - KRATOS_PUBLIC_URL=http://kratos:4433
      - KRATOS_BROWSER_URL=http://localhost:4433
      - BASE_URL=http://localhost:4455
      - JWKS_URL=http://hydra:4444/.well-known/jwks.json
    networks:
      - ory
    restart: unless-stopped
    depends_on:
      - kratos

networks:
  ory:
    driver: bridge